      <h1>OnePay — Recaudo Inteligente para ISPs</h1>
      <p>Tus usuarios te pagan en 5 días, no en 25. OnePay cobra por WhatsApp, concilia en tiempo real y te muestra cuánta plata te va a entrar esta semana.</p>

      <h2>Métricas clave</h2>
      <ul>
        <li><strong>+100 ISPs activas</strong> con recaudo inteligente</li>
        <li><strong>5.8 días promedio</strong> para recibir pago (vs. 18 del mercado)</li>
        <li><strong>93% pagos exitosos</strong> sin fricción</li>
        <li><strong>~15 segundos para pagar</strong> — 4 clicks</li>
      </ul>

      <h2>El problema que resolvemos</h2>
      <p>No estás perdiendo pagos. Estás perdiendo clientes. Cuando pagar es difícil, el usuario no insiste — se rinde.</p>
      <ul>
        <li><strong>Flujo de caja:</strong> Día 18 promedio para recibir un pago — 18 días de caja que financian la operación de otros.</li>
        <li><strong>Fuga de clientes:</strong> 25–35% de cartera vencida que en realidad es deserción silenciosa.</li>
        <li><strong>Experiencia rota:</strong> 3+ intentos de pago fallidos antes de rendirse — cada uno daña la relación.</li>
      </ul>

      <h2>Cómo funciona OnePay</h2>
      <p>OnePay se conecta a tu sistema de gestión (ISPCube, Wisphub, MikroTik, etc.), detecta facturas pendientes y envía links de pago personalizados por WhatsApp. El usuario paga en 15 segundos con Nequi, Daviplata, tarjeta, PSE o Efecty. La conciliación es automática y en tiempo real.</p>

      <h2>Seguridad</h2>
      <p>Certificación PCI DSS Nivel 1 — el mismo nivel de seguridad que usan los bancos.</p>

      <h2>ISPs que confían en OnePay</h2>
      <p>Linage Comunicaciones, Tu Norte TV, Velonet, Wifimax, Supercable, Legon Telecomunicaciones, Fiesta Telecomunicaciones, Cable Éxito, Ultranet Colombia, WISP Telecomunicaciones, Asonet Colombia, Hola Internet, Click HD, Puntored Telecomunicaciones, INTV, Conectic, One Telecomunicaciones, Siinternet, Vivetel, y más.</p>

      <h2>Métodos de pago</h2>
      <p>Nequi, Daviplata, Bancolombia, Visa, Mastercard, American Express, PSE, Efecty.</p>
