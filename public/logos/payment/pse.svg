  <!-- PSE text -->
  <text x="80" y="56" font-family="'Helvetica Neue',Arial,Helvetica,sans-serif" font-weight="800" font-size="52" letter-spacing="-1" fill="#003764">PSE</text>
  <!-- Subtitle -->
  <text x="80" y="78" font-family="'Helvetica Neue',Arial,Helvetica,sans-serif" font-weight="500" font-size="12.5" fill="#003764">Pagos Seguros en Línea</text>
</svg>
