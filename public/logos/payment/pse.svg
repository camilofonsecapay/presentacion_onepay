<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100">
  <!-- PSE - Pagos Seguros en Línea (Colombia) -->
  <!-- Globe/dot pattern icon -->
  <g fill="#003764">
    <!-- Dot globe - row 1 (top) -->
    <circle cx="30" cy="14" r="2.2"/>
    <circle cx="38" cy="12" r="2.2"/>
    <circle cx="46" cy="14" r="2.2"/>
    <!-- Dot globe - row 2 -->
    <circle cx="18" cy="22" r="2.4"/>
    <circle cx="26" cy="20" r="2.4"/>
    <circle cx="34" cy="19" r="2.4"/>
    <circle cx="42" cy="19" r="2.4"/>
    <circle cx="50" cy="20" r="2.4"/>
    <circle cx="58" cy="22" r="2.4"/>
    <!-- Dot globe - row 3 -->
    <circle cx="12" cy="31" r="2.5"/>
    <circle cx="20" cy="29" r="2.5"/>
    <circle cx="28" cy="28" r="2.5"/>
    <circle cx="36" cy="27.5" r="2.5"/>
    <circle cx="44" cy="27.5" r="2.5"/>
    <circle cx="52" cy="28" r="2.5"/>
    <circle cx="60" cy="29" r="2.5"/>
    <!-- Dot globe - row 4 (equator) -->
    <circle cx="10" cy="40" r="2.6"/>
    <circle cx="18" cy="38.5" r="2.6"/>
    <circle cx="26" cy="37.5" r="2.6"/>
    <circle cx="34" cy="37" r="2.6"/>
    <circle cx="42" cy="37" r="2.6"/>
    <circle cx="50" cy="37.5" r="2.6"/>
    <circle cx="58" cy="38.5" r="2.6"/>
    <circle cx="66" cy="40" r="2.6"/>
    <!-- Dot globe - row 5 -->
    <circle cx="12" cy="49" r="2.5"/>
    <circle cx="20" cy="47.5" r="2.5"/>
    <circle cx="28" cy="47" r="2.5"/>
    <circle cx="36" cy="46.5" r="2.5"/>
    <circle cx="44" cy="46.5" r="2.5"/>
    <circle cx="52" cy="47" r="2.5"/>
    <circle cx="60" cy="47.5" r="2.5"/>
    <!-- Dot globe - row 6 -->
    <circle cx="18" cy="56" r="2.4"/>
    <circle cx="26" cy="55.5" r="2.4"/>
    <circle cx="34" cy="55" r="2.4"/>
    <circle cx="42" cy="55" r="2.4"/>
    <circle cx="50" cy="55.5" r="2.4"/>
    <circle cx="58" cy="56" r="2.4"/>
